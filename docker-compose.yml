version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: revenue_simulator
      POSTGRES_USER: simulator
      POSTGRES_PASSWORD: simulator
    ports:
      - '5433:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Auto-run schema + seed on first start
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U simulator -d revenue_simulator']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
